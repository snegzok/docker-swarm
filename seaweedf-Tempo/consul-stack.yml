version: '3.8'

services:
  consul:
    image: hashicorp/consul:1.18.2
    command: agent -server -bootstrap-expect=1 -client=0.0.0.0
    networks:
      - monitoring
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]

networks:
  dockerswarm_monitoring:
    external: true

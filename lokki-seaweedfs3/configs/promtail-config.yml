server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  # ВАЖНО: укажите точное имя вашего сервиса Loki в Swarm. 
  # Если стек называется loki, а сервис loki, то хост будет loki_loki:3100
  - url: http://loki_loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: swarm-containers
    static_configs:
      - targets: [localhost]
        labels:
          job: docker-containers
          __path__: /var/lib/docker/containers/*/*.log

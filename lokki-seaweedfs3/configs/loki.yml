auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  http_listen_address: "0.0.0.0"

common:
  path_prefix: /loki
  storage:
    s3:
      endpoint: seaweedfs_s3:8333
      bucketnames: loki-logs
      access_key: ""
      secret_key: ""
      s3forcepathstyle: true
      insecure: true
  replication_factor: 1

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
  chunk_idle_period: 5m
  chunk_retain_period: 30s

limits_config:
  retention_period: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

query_scheduler:
  max_outstanding_requests_per_tenant: 0

frontend:
  scheduler_address: ""
